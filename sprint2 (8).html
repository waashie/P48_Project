<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMDEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Design.css">
    <link rel="stylesheet" href="Schedule.css">
</head>
<body>
 
<div class="sidebar" id="sidebar">
    <a href="index.html">Home</a>
    <a href="#" onclick="openScheduleModal(); closeSidebar();">Schedule</a>
    <a href="https://p48marketing.com/team/">Team</a>
    <a href="https://p48marketing.com/client-work/">Work</a>
    <a href="https://p48marketing.com/blog/">Stories</a>
</div>
 
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
 
<div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <a href="https://p48marketing.com">
        <img src="P48_Logo.png" alt="P48 Logo" height="70"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <span style="display:none; font-weight:600; font-size:20px; color:#f64fd6;">P48</span>
    </a>
    <div class="social">
        <button class="dropbtn">
            <span class="btn-icon">∨</span>
        </button>
        <div class="social-content">
            <a href="https://www.instagram.com/p48marketing/">
                <img src="Instagram_Icon.png" alt="" height="40" onerror="this.style.display='none'"> Instagram
            </a>
            <a href="https://www.linkedin.com/company/p48/">
                <img src="LinkedIn_Icon.png" alt="" height="40" onerror="this.style.display='none'"> LinkedIn
            </a>
            <a href="https://www.twitter.com/p48marketing/">
                <img src="X.png" alt="" height="40" onerror="this.style.display='none'"> Twitter
            </a>
        </div>
    </div>
</div>
 
<hr>
 
<section class="page" id="page1">
    <div class="page1-container">
        <div id="header">
        <button id="confirmButton" class="button button1">Confirm Scheduling</button>            
        <button class="button button2" onclick="openScheduleModal()">Select date</button>
        </div>
        <div id="grid-item1">
            <div style="font-size:14px; font-weight:600; margin-bottom:6px;">
                <!-- gives name for the station-->
                Station: <span id="mainStationName">Needs to be selected </span>
            </div>
            <div style="font-size:14px; font-weight:600; margin-top:10px; color:#333;">
                <span>Total ads: <span id="mainTotalAds">0</span></span>
                &nbsp;&nbsp;
                <span>Total cost: <span id="mainTotalCost">$0.00</span></span>
            </div>
        </div>
    </div>
</section>
 
<div id="scheduleModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeScheduleModal()">✕ Close</button>
 
                <div class="grid-top">
                    <input type="text" id="stationInput" class="station-input" placeholder="Station name...">

                    <button class="grid-title-bar" id="startWeekBtn">
                        Start Week
                    </button>

                    <button class="grid-title-bar" id="endWeekBtn">
                        End Week
                    </button>

                    <input type="week" id="weekStart" style="display:none;">
                    <input type="week" id="weekEnd" style="display:none;">

                    <button class="grid-add-btn" onclick="addRow()">+ Add daypart</button>
                </div>
 
        <div class="grid-wrap">
            <table id="daypartGrid">
                <thead>
                    <tr>
                        <th class="lft">Daypart</th>
                        <th>Ads/wk</th>
                        <th>Length</th>
                        <th>Mo</th>
                        <th>Tu</th>
                        <th>We</th>
                        <th>Th</th>
                        <th>Fr</th>
                        <th>Sa</th>
                        <th>Su</th>
                        <th>Rate ($)</th>
                        <th>Cost</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="gridBody"></tbody>
            </table>
        </div>
        <div style="display:flex; gap:20px; margin-top:16px; font-weight:600; font-size:13px; padding:0 4px;">
            <span>Total ads: <span id="totalAds">0</span></span>
            <span>Total cost: <span id="totalCost">$0.00</span></span>
        </div>
    </div>
</div>
 
<script src="Design2.js?v=5"></script>
<script src="Schedule2.js?v=5"></script>
<script>
    function openScheduleModal() {
        document.getElementById('scheduleModal').style.display = 'block';
        renderGrid();
    }
 
    function closeScheduleModal() {
        document.getElementById('scheduleModal').style.display = 'none';
    }
 
    document.getElementById('scheduleModal').addEventListener('click', function(e) {
        if (e.target === this) closeScheduleModal();
    });
</script>
 
 <div id="confirmModal" class="confirm-modal">
    <div class="confirm-box">
        <h3>✔ Confirmed</h3>

        <div style="font-size:14px; text-align:left; margin-top:10px;">
            <p><b>Station:</b> <span id="confirmStation"></span></p>
            <p><b>Total Ads:</b> <span id="confirmAds"></span></p>
            <p><b>Total Cost:</b> <span id="confirmCost"></span></p>
            <p><b>Week Range:</b> <span id="confirmWeek"></span></p>
        </div>

        <button onclick="closeConfirmModal()">OK</button>
    </div>
</div>
</body>
</html>
